[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    -p no:warnings

markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    slow: Slow running tests
    requires_key: Tests requiring private key
