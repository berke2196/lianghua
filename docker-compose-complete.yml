version: '3.8'

services:
  # 后端 API (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-trader-api
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Nginx 反向代理 (提供前端)
  nginx:
    image: nginx:alpine
    container_name: crypto-trader-frontend
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
