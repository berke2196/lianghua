apiVersion: v1
kind: Namespace
metadata:
  name: trading-system
  labels:
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-config
  namespace: trading-system
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  METRICS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"

---
apiVersion: v1
kind: Secret
metadata:
  name: trading-secrets
  namespace: trading-system
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/trading"
  HYPERLIQUID_API_KEY: ""
  HYPERLIQUID_API_SECRET: ""
  DISCORD_WEBHOOK_URL: ""
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trading-engine
  namespace: trading-system
  labels:
    app: trading-engine
spec:
  serviceName: trading-engine
  replicas: 2
  selector:
    matchLabels:
      app: trading-engine
  template:
    metadata:
      labels:
        app: trading-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - trading-engine
                topologyKey: kubernetes.io/hostname
      
      containers:
        - name: trading-engine
          image: trading-engine:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: trading-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: trading-config
                  key: ENVIRONMENT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: DATABASE_URL
            - name: HYPERLIQUID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: HYPERLIQUID_API_KEY
            - name: HYPERLIQUID_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: HYPERLIQUID_API_SECRET
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: DISCORD_WEBHOOK_URL
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: logs
              mountPath: /app/logs
      
      volumes:
        - name: config
          configMap:
            name: trading-config
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: trading-engine
  namespace: trading-system
  labels:
    app: trading-engine
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: trading-engine

---
apiVersion: v1
kind: Service
metadata:
  name: trading-engine-headless
  namespace: trading-system
  labels:
    app: trading-engine
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app: trading-engine

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading-engine-hpa
  namespace: trading-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: trading-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: trading-engine-pdb
  namespace: trading-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: trading-engine

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trading-engine
  namespace: trading-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trading-engine
  namespace: trading-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trading-engine
  namespace: trading-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trading-engine
subjects:
  - kind: ServiceAccount
    name: trading-engine
    namespace: trading-system

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: trading-engine
  namespace: trading-system
spec:
  selector:
    matchLabels:
      app: trading-engine
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: trading-engine-alerts
  namespace: trading-system
spec:
  groups:
    - name: trading-engine
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: rate(api_errors_total[5m]) > 0.05
          for: 5m
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value }}"
        
        - alert: HighLatency
          expr: histogram_quantile(0.95, api_latency_seconds) > 1.0
          for: 5m
          annotations:
            summary: "High API latency detected"
            description: "P95 latency is {{ $value }}s"
        
        - alert: LowWinRate
          expr: win_rate_percent < 40
          for: 1h
          annotations:
            summary: "Low win rate detected"
            description: "Win rate is {{ $value }}%"
        
        - alert: HighDrawdown
          expr: drawdown_percent > 20
          for: 30m
          annotations:
            summary: "High drawdown detected"
            description: "Drawdown is {{ $value }}%"
        
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[1h]) > 0
          for: 5m
          annotations:
            summary: "Pod crash looping"
            description: "Pod {{ $labels.pod }} is crash looping"

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trading-engine-backup
  namespace: trading-system
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: trading-engine
          containers:
            - name: backup
              image: trading-engine:latest
              command:
                - python
                - -c
                - "from backup import backup_database; backup_database()"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: trading-secrets
                      key: DATABASE_URL
          restartPolicy: OnFailure

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trading-engine-maintenance
  namespace: trading-system
spec:
  schedule: "0 3 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: trading-engine
          containers:
            - name: maintenance
              image: trading-engine:latest
              command:
                - python
                - -c
                - "from maintenance import run_maintenance; run_maintenance()"
          restartPolicy: OnFailure
