# Hyperliquid AI Trader v2 - 配置文件

# ============ 交易引擎配置 ============

# 单个持仓最多占资金比例 (0.05 = 5%)
MAX_POSITION_SIZE = 0.1

# 止损百分比
STOP_LOSS_PERCENT = 0.05

# 止盈百分比
TAKE_PROFIT_PERCENT = 0.10

# ============ API 配置 ============

# FastAPI 服务器
API_HOST = "0.0.0.0"
API_PORT = 8000
API_LOG_LEVEL = "info"

# Hyperliquid API
HYPERLIQUID_API_URL = "https://api.hyperliquid.xyz"
HYPERLIQUID_TESTNET_URL = "https://api-testnet.hyperliquid.xyz"

# 使用测试网 (True/False)
USE_TESTNET = False

# API 超时时间 (秒)
API_TIMEOUT = 30

# ============ 自动交易配置 ============

# 交易周期 (秒)
TRADING_CYCLE_INTERVAL = 30

# 策略检查间隔 (秒)
STRATEGY_CHECK_INTERVAL = 30

# 最大并发交易
MAX_CONCURRENT_TRADES = 5

# ============ 策略参数 ============

# RSI 周期
RSI_PERIOD = 14

# MACD 参数
MACD_FAST = 12
MACD_SLOW = 26
MACD_SIGNAL = 9

# 移动平均线周期
SMA_FAST = 10
SMA_MID = 20
SMA_SLOW = 50

# 布林带参数
BB_PERIOD = 20
BB_STD_DEV = 2

# ============ 风险管理 ============

# 最大日亏损限制 (%)
MAX_DAILY_LOSS = 0.10

# 最大单笔亏损
MAX_TRADE_LOSS = 0.05

# 最大杠杆倍数
MAX_LEVERAGE = 10

# 最小杠杆倍数
MIN_LEVERAGE = 1

# ============ 日志配置 ============

# 日志级别 (DEBUG/INFO/WARNING/ERROR)
LOG_LEVEL = "INFO"

# 日志文件
LOG_FILE = "trading.log"

# 日志最大大小 (MB)
LOG_MAX_SIZE = 100

# 日志保留天数
LOG_RETENTION_DAYS = 30

# ============ 通知配置 ============

# 启用邮件通知
ENABLE_EMAIL = False

# 邮箱
EMAIL_SMTP_SERVER = "smtp.gmail.com"
EMAIL_SMTP_PORT = 587
EMAIL_ADDRESS = "your-email@gmail.com"
EMAIL_PASSWORD = "your-password"

# 启用 Webhook
ENABLE_WEBHOOK = False

# Webhook URL (钉钉、企业微信等)
WEBHOOK_URL = ""

# ============ 数据库配置 ============

# 数据库类型 (sqlite/mysql/postgresql)
DB_TYPE = "sqlite"

# 数据库连接字符串
DB_URL = "sqlite:///trading_bot.db"

# 是否自动创建表
AUTO_CREATE_TABLES = True

# ============ 性能优化 ============

# 缓存价格数据 (秒)
PRICE_CACHE_TTL = 5

# 批量查询大小
BATCH_QUERY_SIZE = 100

# 连接池大小
CONNECTION_POOL_SIZE = 10
